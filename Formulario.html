<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Evaluación de Cultura Organizacional</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    h2 {
      margin-top: 30px;
      color: #333;
    }

    .row {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
    }

    .row label {
      flex: 1;
    }

    .row input {
      width: 80px;
      padding: 5px;
      text-align: center;
    }

    .total {
      font-weight: bold;
      margin-top: 10px;
    }

    .error {
      color: red;
      font-size: 14px;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Evaluación de Cultura Organizacional</h1>
  <p>Distribuye 100 puntos entre las opciones A, B, C y D.</p>

  <!-- BLOQUE ACTUAL -->
  <h2>1. Cultura Actual</h2>

  <div id="actual">
    <div class="row">
      <label>A. Ambiente familiar y cercano</label>
      <input type="number" min="0" onchange="calcular('actual')">
    </div>
    <div class="row">
      <label>B. Orientado a resultados y competencia</label>
      <input type="number" min="0" onchange="calcular('actual')">
    </div>
    <div class="row">
      <label>C. Innovación y toma de riesgos</label>
      <input type="number" min="0" onchange="calcular('actual')">
    </div>
    <div class="row">
      <label>D. Control, normas y estructura</label>
      <input type="number" min="0" onchange="calcular('actual')">
    </div>

    <div class="total">Total: <span id="total-actual">0</span></div>
    <div class="error" id="error-actual"></div>
  </div>

  <!-- BLOQUE PREFERIDO -->
  <h2>2. Cultura Preferida</h2>

  <div id="preferido">
    <div class="row">
      <label>A. Ambiente familiar y cercano</label>
      <input type="number" min="0" onchange="calcular('preferido')">
    </div>
    <div class="row">
      <label>B. Orientado a resultados y competencia</label>
      <input type="number" min="0" onchange="calcular('preferido')">
    </div>
    <div class="row">
      <label>C. Innovación y toma de riesgos</label>
      <input type="number" min="0" onchange="calcular('preferido')">
    </div>
    <div class="row">
      <label>D. Control, normas y estructura</label>
      <input type="number" min="0" onchange="calcular('preferido')">
    </div>

    <div class="total">Total: <span id="total-preferido">0</span></div>
    <div class="error" id="error-preferido"></div>
  </div>

  <button onclick="enviar()">Enviar</button>
</div>

<script>
function calcular(seccion) {
  const inputs = document.querySelectorAll(`#${seccion} input`);
  let total = 0;

  inputs.forEach(input => {
    total += Number(input.value) || 0;
  });

  document.getElementById(`total-${seccion}`).textContent = total;

  if (total !== 100) {
    document.getElementById(`error-${seccion}`).textContent = "La suma debe ser 100";
  } else {
    document.getElementById(`error-${seccion}`).textContent = "";
  }
}

async function enviar() {
  const actual = document.querySelectorAll("#actual input");
  const pref = document.querySelectorAll("#preferido input");

  const data = {
    A_actual: Number(actual[0].value),
    B_actual: Number(actual[1].value),
    C_actual: Number(actual[2].value),
    D_actual: Number(actual[3].value),
    A_pref: Number(pref[0].value),
    B_pref: Number(pref[1].value),
    C_pref: Number(pref[2].value),
    D_pref: Number(pref[3].value)
  };

  const totalActual = data.A_actual + data.B_actual + data.C_actual + data.D_actual;
  const totalPref = data.A_pref + data.B_pref + data.C_pref + data.D_pref;

  if (totalActual !== 100 || totalPref !== 100) {
    alert("Ambos bloques deben sumar 100");
    return;
  }

  try {
    await fetch("https://script.google.com/macros/s/AKfycbyW8xtCCbV0lS4nrE71MX7IQezPHe1IguGUxcULRvlP8SACaCZ6DLcupgaSJexnlicL/exec", {
      method: "POST",
      body: JSON.stringify(data),
      mode: "no-cors"
    });

    alert("Datos enviados correctamente ✅");

  } catch (error) {
    alert("Error al enviar ❌");
    console.error(error);
  }
}
</script>

</body>
</html>
